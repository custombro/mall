name: Production Pages Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Deploy target ref"
        required: true
        default: "main"

concurrency:
  group: production-pages
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PROJECT_NAME: custombro-mall-order-v1
      NODE_VERSION: 20.19.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit

      - name: Deploy production to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=${PROJECT_NAME} --branch=main
