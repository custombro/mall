name: Preview Pages Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-pages-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PROJECT_NAME: custombro-mall-order-v1
      NODE_VERSION: 20.19.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit

      - name: Deploy preview to Cloudflare Pages
        run: npx wrangler pages deploy out --project-name=${PROJECT_NAME} --branch=pr-${{ github.event.pull_request.number }}
